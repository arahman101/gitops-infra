apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-app-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/arahman101/gitops-infra.git
    targetRevision: main
    path: helm/redis-app

    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true