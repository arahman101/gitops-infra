apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-app-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/arahman101/gitops-infra.git
    targetRevision: main
    path: helm/redis-app

    helm:
      valueFiles:
        - ../../environments/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true